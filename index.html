<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZC 門市績效系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%); 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }
        .card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 24px; 
            box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.1), 0 8px 10px -6px rgba(236, 72, 153, 0.1);
            backdrop-filter: blur(8px);
        }
        label { font-weight: 600; color: #9d174d; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 6px; }
        input, select, textarea { 
            width: 100%; padding: 0.85rem; border: 1.5px solid #fbcfe8; border-radius: 14px; margin-bottom: 1rem; font-size: 16px;
            transition: all 0.2s; background-color: white;
        }
        input:focus, textarea:focus { outline: none; border-color: #ec4899; box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.15); }
        .section-title { 
            display: flex; align-items: center; gap: 8px;
            margin: 1.8rem 0 1rem 0; font-size: 1.25rem; font-weight: 800; color: #be185d; 
        }
        #loadingOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; align-items: center; justify-content: center; color: white; flex-direction: column; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-pink-500 border-t-transparent mb-4"></div>
        <p class="font-bold text-xl text-white">正在傳送門市績效數據 📊</p>
    </div>

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-extrabold text-pink-900 tracking-tight">ZC 門市績效系統 📈</h1>
            <p class="text-pink-600 font-medium mt-1">簡化流程，專注核心店務與現場業績</p>
        </header>

        <form id="storeForm" class="card p-6 md:p-8 mb-6">
            <div class="section-title"><span>📍</span> 基本資訊</div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-2">
                <div>
                    <label>填報日期</label>
                    <input type="date" name="report_date" id="reportDate" required>
                </div>
                <div>
                    <label>回報門市</label>
                    <select name="store_name" required>
                        <option value="中山門市">🏛️ 中山門市</option>
                        <option value="中原門市">🏡 中原門市</option>
                        <option value="新竹門市">🚄 新竹門市</option>
                        <option value="台北中心">📦 台北中心</option>
                    </select>
                </div>
                <div>
                    <label>今日人流體感</label>
                    <select name="passenger_flow" required>
                        <option value="很多">🔥 很多</option>
                        <option value="多">👍 多</option>
                        <option value="中等">😐 中等</option>
                        <option value="少">📉 少</option>
                        <option value="很少">❌ 很少</option>
                    </select>
                </div>
                <div>
                    <label>總結回報人員</label>
                    <input type="text" name="reporter_name" placeholder="請輸入填表人姓名" required>
                </div>
            </div>

            <div class="section-title"><span>🛍️</span> 今日業績數據</div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div>
                    <label>今日銷售總單數 (筆)</label>
                    <input type="number" name="total_orders" id="totalOrders" placeholder="請輸入總筆數" min="1" oninput="calculateUPT()" required>
                </div>
                <div>
                    <label>今日銷售總件數 (件)</label>
                    <input type="number" name="total_items" id="totalItems" placeholder="請輸入總件數" min="0" oninput="calculateUPT()" required>
                </div>
                <div>
                    <label class="text-pink-700 font-bold">自動換算 UPT</label>
                    <input type="text" name="calculated_upt" id="calculatedUPT" class="bg-pink-50 font-bold text-pink-700 border-pink-300" placeholder="自動計算中..." readonly>
                </div>
            </div>

            <div class="section-title"><span>🔍</span> 6月核心·特勤與顧客商品諮詢查核</div>
            
            <div class="bg-pink-50/50 p-4 rounded-2xl border border-pink-100 mb-4">
                <label>🔥 今日是否有閉店客服務？</label>
                <select name="has_closing_customer" id="hasClosingCustomer" onchange="toggleClosingStaff()" required>
                    <option value="無">❌ 無</option>
                    <option value="有">✨ 有（請在下方填寫接待人員）</option>
                </select>
                
                <div id="closingStaffWrapper" class="hidden mt-2">
                    <label class="text-sm text-pink-700">👤 閉店客接待人員是誰？</label>
                    <input type="text" name="closing_staff" id="closingStaff" placeholder="請輸入接待夥伴的姓名（例如：琇琇、小魚）">
                </div>
            </div>

            <div class="bg-pink-50/50 p-4 rounded-2xl border border-pink-100 mb-2">
                <label>📸 今日是否有顧客拿網路商品照片問貨？</label>
                <select name="has_photo_inquiry" required>
                    <option value="無">❌ 無</option>
                    <option value="有">🙋‍♀️ 有（客人詢問度高）</option>
                </select>
                <textarea name="photo_inquiry_detail" rows="2" placeholder="若有，請簡述客人是詢問哪一張照片/哪款服飾商品？"></textarea>
            </div>

            <div class="section-title"><span>📝</span> 今日工作分析與回饋</div>
            <p class="text-xs text-pink-700 bg-pink-50 p-3 rounded-xl border border-pink-100 mb-3 leading-relaxed">
                💡 **填寫導引（可自由融合以下內容）：**<br>
                • **店況分析：** 今天的整體銷售狀況、特殊客訴或店務突發事件處理。<br>
                • **明天交接：** 有什麼需要交代給明天開班人員或特別提醒自己的話？<br>
                • **公司建議：** 有沒有需要給總部、倉儲或採購的補貨/版型反饋建議？
            </p>
            <textarea name="work_feedback" rows="6" placeholder="請輸入今日門市的綜合分析與反饋..." required></textarea>

            <button type="submit" id="submitBtn" class="w-full bg-pink-600 text-white font-bold py-4 rounded-2xl shadow-xl mt-4 hover:bg-pink-700 transition">傳送今日門市日報 🚀</button>
        </form>

        <div id="resultContainer" class="card p-6 hidden">
            <h2 class="text-lg font-bold mb-3 text-pink-800 flex justify-between items-center">
                <span>📋 LINE 門市回報草稿</span>
                <button onclick="copyToClipboard()" class="text-xs bg-pink-600 text-white px-4 py-1.5 rounded-full hover:bg-pink-700 transition">複製文字</button>
            </h2>
            <pre id="resultText" class="whitespace-pre-wrap bg-pink-50 p-5 rounded-2xl text-gray-700 text-sm leading-relaxed border border-blue-100"></pre>
        </div>
    </div>

    <script>
        // 自動帶入當天日期
        document.getElementById('reportDate').valueAsDate = new Date();

        // 即時自動換算 UPT 邏輯
        function calculateUPT() {
            const orders = parseFloat(document.getElementById('totalOrders').value);
            const items = parseFloat(document.getElementById('totalItems').value);
            const uptInput = document.getElementById('calculatedUPT');

            if (orders > 0 && items >= 0) {
                const upt = items / orders;
                uptInput.value = upt.toFixed(2);
            } else {
                uptInput.value = '';
            }
        }

        // 控制閉店客接待人員欄位的顯示與隱藏
        function toggleClosingStaff() {
            const hasClosing = document.getElementById('hasClosingCustomer').value;
            const wrapper = document.getElementById('closingStaffWrapper');
            const input = document.getElementById('closingStaff');
            if (hasClosing === '有') {
                wrapper.classList.remove('hidden');
                input.required = true;
            } else {
                wrapper.classList.add('hidden');
                input.required = false;
                input.value = '';
            }
        }

        // 請記得檢查或替換成您串接此表單的 GAS 網址
        const scriptURL = 'https://script.google.com/macros/s/你的網址/exec'; 

        const form = document.getElementById('storeForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: new FormData(form)})
            .then(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                generatePreview();
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loadingOverlay').style.display = 'none';
                generatePreview();
            });
        });

        function generatePreview() {
            const data = new FormData(form);
            const closingStaffStr = data.get('closing_staff') ? ` (接待人員：${data.get('closing_staff')})` : '';
            
            let report = `📊 《ZC 門市績效日報》\n`;
            report += `━━━━━━━━━━━━━━━━━━━━\n`;
            report += `📅 日期：${data.get('report_date')}\n`;
            report += `📍 門市：${data.get('store_name')}\n`;
            report += `👤 回報人員：${data.get('reporter_name')}\n`;
            report += `👥 今日人流體感：${data.get('passenger_flow')}\n`;
            report += `━━━━━━━━━━━━━━━━━━━━\n`;
            report += `🧾 今日總單數：${data.get('total_orders')} 筆\n`;
            report += `🧺 今日總件數：${data.get('total_items')} 件\n`;
            report += `📈 平均 UPT：${data.get('calculated_upt') || '0.00'} \n`;
            report += `━━━━━━━━━━━━━━━━━━━━\n\n`;
            
            report += `《 核心特勤與商品諮詢查核 🔍 》\n`;
            report += `🌙 閉店客服務：${data.get('has_closing_customer')}${closingStaffStr}\n`;
            report += `📸 照片問貨：${data.get('has_photo_inquiry')}\n`;
            if(data.get('photo_inquiry_detail')) {
                report += `💬 問貨詳情：${data.get('photo_inquiry_detail')}\n`;
            }
            report += `\n━━━━━━━━━━━━━━━━━━━━\n\n`;
            
            report += `📝 【今日工作分析與回饋】：\n`;
            report += `${data.get('work_feedback')}\n\n`;
            report += `━━━━━━━━━━━━━━━━━━━━\n`;
            report += `✨ 門市營運日報已上傳。大家辛苦了！`;

            document.getElementById('resultText').innerText = report;
            document.getElementById('resultContainer').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function copyToClipboard() {
            const text = document.getElementById('resultText').innerText;
            const el = document.createElement('textarea');
            el.value = text; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            alert('已複製到剪貼簿，可以傳到 LINE 群組囉！');
        }
    </script>
</body>
</html>
