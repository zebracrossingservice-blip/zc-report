<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZC 門市績效系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%); 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }
        .card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 24px; 
            box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.1), 0 8px 10px -6px rgba(236, 72, 153, 0.1);
            backdrop-filter: blur(8px);
        }
        label { font-weight: 600; color: #4b5563; margin-bottom: 0.4rem; display: flex; align-items: center; gap: 4px; }
        input, select, textarea { 
            width: 100%; padding: 0.85rem; border: 1.5px solid #f9a8d4; border-radius: 14px; margin-bottom: 1rem; font-size: 16px;
            transition: all 0.2s;
            background-color: white;
        }
        input:focus, textarea:focus { outline: none; border-color: #ec4899; box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.15); transform: translateY(-1px); }
        .section-title { 
            display: flex; align-items: center; gap: 8px;
            margin: 2rem 0 1.2rem 0; font-size: 1.2rem; font-weight: 800; color: #be185d; 
        }
        .perf-row { 
            background: linear-gradient(to right, #ffffff, #fff1f2); 
            padding: 1.5rem; border-radius: 20px; margin-bottom: 1.2rem; 
            border: 1px solid #fbcfe8;
            position: relative;
        }
        #loadingOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; align-items: center; justify-content: center; color: white; flex-direction: column; backdrop-filter: blur(4px); }
        .btn-primary {
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(236, 72, 153, 0.4); }
        .google-sheet-btn {
            background: #10b981; color: white; padding: 10px 20px; border-radius: 12px; font-weight: bold;
            display: inline-flex; align-items: center; gap: 8px; margin-bottom: 1rem; transition: all 0.2s;
        }
        .upt-box { background: #fff1f2; border: 2px dashed #ec4899; padding: 1rem; border-radius: 16px; text-align: center; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-pink-500 border-t-transparent mb-4"></div>
        <p class="font-bold text-xl text-white">正在同步數據 ✨</p>
    </div>

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-gray-800 tracking-tight">《ZC》門市績效系統 🎀</h1>
            <p class="text-pink-600 font-medium mt-2">辛苦了！追求 UPT > 3 的路上我們一起努力 🚀</p>
        </header>

        <div class="flex justify-end mb-4">
            <a href="https://docs.google.com/spreadsheets/d/1O0z1I6v_wXQY0t_WclN89pDOfL4O60p8gUuO924M6V4/edit" target="_blank" class="google-sheet-btn shadow-lg text-sm">
                📊 查看後端數據表
            </a>
        </div>

        <form id="storeForm" class="card p-6 md:p-10 mb-8">
            <div class="section-title"><span>📍</span> 基本資訊</div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
                <div>
                    <label>回報單位</label>
                    <select name="store_name" id="store_name" required>
                        <option value="">選擇單位</option>
                        <option value="中山門市">🏛️ 中山門市</option>
                        <option value="中原門市">🏡 中原門市</option>
                        <option value="新竹門市">🚄 新竹門市</option>
                        <option value="台北中心">📦 台北中心</option>
                    </select>
                </div>
                <div><label>日期</label><input type="date" name="date" id="date" required></div>
                <div>
                    <label>星期</label>
                    <select name="weekday" id="weekday">
                        <option value="一">星期一</option><option value="二">星期二</option><option value="三">星期三</option>
                        <option value="四">星期四</option><option value="五">星期五</option><option value="六">星期六</option>
                        <option value="日">星期日</option>
                    </select>
                </div>
                <div><label>今日進店人流</label><input type="number" name="visitor_count" value="0"></div>
            </div>

            <div class="section-title"><span>📊</span> 今日數據總計</div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div><label>總件數 🧺</label><input type="number" name="total_items" id="total_items" required placeholder="件"></div>
                <div><label>總筆數 🧾</label><input type="number" name="total_orders" id="total_orders" required placeholder="筆"></div>
                <div><label>全店新增 VIP 💎</label><input type="number" name="total_vip_all" value="0"></div>
            </div>

            <div class="section-title"><span>💃</span> 人員績效明細</div>
            <div id="staffContainer">
                <div class="perf-row staff-group">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                        <div>
                            <label>銷售人員</label>
                            <select name="staff_name[]" class="staff-select" required onchange="updateCheer(this)">
                                <option value="">選人員</option>
                                <optgroup label="中山店">
                                    <option value="庭庭 zctt">庭庭 zctt</option>
                                    <option value="PINGU">PINGU</option>
                                    <option value="小杜 zcdo">小杜 zcdo</option>
                                    <option value="Reina zcre">Reina zcre</option>
                                </optgroup>
                                <optgroup label="新竹店">
                                    <option value="安安 ">安安 </option>
                                    <option value="PT zcpt5">PT zcpt5</option>
                                    <option value="萱萱 zcpt6">萱萱 zcpt6</option>
                                </optgroup>
                            </select>
                        </div>
                        <div><label>銷售件數</label><input type="number" name="staff_count[]" value="0"></div>
                        <div><label>VIP開發</label><input type="number" name="staff_vip[]" value="0" oninput="updateCheer(this)"></div>
                        <div><label>展示照片</label><input type="number" name="photo_show[]" value="0"></div>
                    </div>
                    <div class="cheer-msg px-1 font-bold text-pink-600 mb-2" style="display:none"></div>
                    <div class="grid grid-cols-3 gap-4">
                        <div><label>人員穿搭</label><input type="text" name="staff_outfit[]" placeholder="貨號"></div>
                        <div><label>詢問</label><input type="number" name="staff_ask[]" value="0"></div>
                        <div><label>買單</label><input type="number" name="staff_buy[]" value="0"></div>
                    </div>
                </div>
            </div>
            <button type="button" onclick="addStaff()" class="text-pink-600 font-bold mb-6 hover:text-pink-700">＋ 新增人員績效</button>

            <div class="section-title"><span>✍️</span> 分析與反映</div>
            <label>門店現況分析</label>
            <textarea name="analysis" rows="3" placeholder="今天店裡有什麼從數據看不到的事？"></textarea>
            
            <label>今日熱銷排名 (Top 3)</label>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4">
                <input type="text" name="hot_item_1" placeholder="1. 貨號">
                <input type="text" name="hot_item_2" placeholder="2. 貨號">
                <input type="text" name="hot_item_3" placeholder="3. 貨號">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 mb-4 md:mb-0">
                    <label class="text-blue-700">給明天開班人員的話 📋</label>
                    <textarea name="to_next_shift" rows="3" placeholder="陳列/倉儲/待辦事項..."></textarea>
                </div>
                <div class="bg-green-50 p-4 rounded-2xl border border-green-100">
                    <label class="text-green-700">給總部倉儲採購建議 📦</label>
                    <textarea name="to_hq_warehouse" rows="3" placeholder="補貨/品質/配貨建議..."></textarea>
                </div>
            </div>
            <div class="mt-4">
                <label class="text-purple-700">Rita 反饋 👑</label>
                <textarea name="feedback_rita" rows="2" placeholder="產品反饋..."></textarea>
            </div>

            <div class="flex flex-col sm:flex-row gap-5 mt-8">
                <button type="submit" id="submitBtn" class="btn-primary flex-1 text-white font-bold py-5 rounded-2xl shadow-xl">完成並送出數據 🚀</button>
                <button type="button" onclick="generatePreview()" class="flex-1 bg-gray-100 text-gray-700 font-bold py-5 rounded-2xl hover:bg-gray-200 transition">僅預覽 LINE 文字 📄</button>
            </div>
        </form>

        <div id="resultContainer" class="card p-6 md:p-8 hidden">
            <h2 class="text-2xl font-bold mb-5 flex justify-between items-center text-pink-700">
                <span>📋 回報摘要預覽</span>
                <button onclick="copyToClipboard()" class="text-sm bg-pink-600 text-white px-5 py-2 rounded-full hover:bg-pink-700">複製整份報告</button>
            </h2>
            <div id="uptAlert" class="upt-box mb-6 font-bold text-xl text-pink-600 hidden"></div>
            <pre id="resultText" class="whitespace-pre-wrap bg-pink-50/50 p-6 rounded-2xl border border-pink-100 text-gray-700 text-sm leading-relaxed"></pre>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycby9QLEMRA_wJUFImeJqNyN-GXkNpFim1MYuPHCCy-HJctbUvHpnpVqVpKVkcuymu8kJhA/exec'; 

        document.getElementById('date').valueAsDate = new Date();
        const dayMap = ['日','一','二','三','四','五','六'];
        document.getElementById('weekday').value = dayMap[new Date().getDay()];

        function updateCheer(el) {
            const row = el.closest('.staff-group');
            const nameEl = row.querySelector('.staff-select');
            const name = nameEl.options[nameEl.selectedIndex].text;
            const vip = parseInt(row.querySelector('input[name="staff_vip[]"]').value) || 0;
            const cheerMsg = row.querySelector('.cheer-msg');
            if (!nameEl.value) { cheerMsg.style.display = 'none'; return; }
            cheerMsg.style.display = 'block';
            cheerMsg.innerText = vip > 0 ? `🔥 強強強！${name.split(' ')[0]} 已經開發 ${vip} 位 VIP 了！` : `✨ ${name.split(' ')[0]} 今天也辛苦了，加油！`;
        }

        function addStaff() {
            const container = document.getElementById('staffContainer');
            const sourceSelect = document.querySelector('.staff-select');
            const div = document.createElement('div');
            div.className = 'perf-row staff-group animate-in fade-in slide-in-from-right-4 duration-300';
            div.innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                    <div><label>銷售人員</label><select name="staff_name[]" class="staff-select" onchange="updateCheer(this)">${sourceSelect.innerHTML}</select></div>
                    <div><label>銷售件數</label><input type="number" name="staff_count[]" value="0"></div>
                    <div><label>VIP開發</label><input type="number" name="staff_vip[]" value="0" oninput="updateCheer(this)"></div>
                    <div><label>展示照片</label><input type="number" name="photo_show[]" value="0"></div>
                </div>
                <div class="cheer-msg px-1 font-bold text-pink-600 mb-2"></div>
                <div class="grid grid-cols-3 gap-4">
                    <div><label>人員穿搭</label><input type="text" name="staff_outfit[]" placeholder="貨號"></div>
                    <div><label>詢問</label><input type="number" name="staff_ask[]" value="0"></div>
                    <div><label>買單</label><input type="number" name="staff_buy[]" value="0"></div>
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="absolute top-4 right-4 text-gray-300 hover:text-red-400">✕</button>
            `;
            container.appendChild(div);
        }

        const form = document.getElementById('storeForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('loadingOverlay').style.display = 'flex';
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: new FormData(form)})
            .then(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                generatePreview();
            })
            .catch(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                generatePreview();
            });
        });

        function generatePreview() {
            const data = new FormData(form);
            const items = parseFloat(data.get('total_items')) || 0;
            const orders = parseFloat(data.get('total_orders')) || 0;
            const upt = orders > 0 ? (items / orders).toFixed(2) : 0;

            // UPT 激勵判斷
            let cheer = "";
            let color = "text-pink-600";
            if (upt < 2) { cheer = "🚀 目前 UPT 低於 2，請加油！多多推廣連帶搭配喔！"; }
            else if (upt <= 2.4) { cheer = "✨ 越來越好囉～持續加油，往達標邁進！"; }
            else if (upt <= 2.79) { cheer = "✅ 恭喜達標！今天的銷售節奏很棒喔！"; }
            else if (upt <= 2.99) { cheer = "🔥 厲害！！差一點點就要破 3 了，衝啊！"; }
            else { cheer = "👑 強強強！全台灣今天你最厲害！UPT 破 3 啦！"; color = "text-red-600"; }

            const uptAlert = document.getElementById('uptAlert');
            uptAlert.innerText = cheer;
            uptAlert.className = `upt-box mb-6 font-bold text-xl ${color}`;
            uptAlert.classList.remove('hidden');

            const names = data.getAll('staff_name[]');
            const counts = data.getAll('staff_count[]');
            const vips = data.getAll('staff_vip[]');
            const photos = data.getAll('photo_show[]');
            const outfits = data.getAll('staff_outfit[]');
            const asks = data.getAll('staff_ask[]');
            const buys = data.getAll('staff_buy[]');
            
            let perfText = "";
            names.forEach((n, i) => { 
                if(n) {
                    perfText += `・${n}: ${counts[i]} 件 [VIP:+${vips[i]}] <照:${photos[i]}>\n`; 
                    perfText += `  └ 穿搭:${outfits[i] || '未填'} / 詢問:${asks[i]} / 買單:${buys[i]}\n`;
                }
            });

            let hotItems = "";
            for(let i=1; i<=3; i++) {
                const item = data.get(`hot_item_${i}`);
                if(item) hotItems += `${i}. ${item}\n`;
            }

            let report = `✨ 《${data.get('store_name')}》業績績效回報 ✨\n`;
            report += `━━━━━━━━━━━━━━━━━━━━\n`;
            report += `📅 日期：${data.get('date')} (${data.get('weekday')})\n`;
            report += `👥 進店人流：${data.get('visitor_count')} 人\n`;
            report += `📦 總件/筆數：${items} / ${orders}\n`;
            report += `📈 UPT 平均件數：${upt} (${upt >= 2.41 ? '達標' : '待努力'})\n`;
            report += `💎 全店 VIP 開發：${data.get('total_vip_all')}\n\n`;
            report += `《 個人績效明細 💃 》\n${perfText}\n`;
            report += `《 門店現況分析 📝 》\n${data.get('analysis') || '無'}\n\n`;
            report += `《 今日熱銷排名 🔥 》\n${hotItems || '無'}\n`;
            report += `《 給明天開班的話 📋 》\n${data.get('to_next_shift') || '無'}\n\n`;
            report += `《 給總部倉儲建議 📦 》\n${data.get('to_hq_warehouse') || '無'}\n\n`;
            report += `《 Rita 反饋 👑 》\n${data.get('feedback_rita') || '無'}\n`;
            report += `━━━━━━━━━━━━━━━━━━━━\n`;
            report += `💕 ${cheer.split('！')[0]}！辛苦大家了！`;

            document.getElementById('resultText').innerText = report;
            document.getElementById('resultContainer').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function copyToClipboard() {
            const text = document.getElementById('resultText').innerText;
            const el = document.createElement('textarea');
            el.value = text; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            const btn = event.target;
            btn.innerText = "✅ 已複製報告！";
            setTimeout(() => { btn.innerText = "複製整份報告"; }, 2000);
        }
    </script>
</body>
</html>
